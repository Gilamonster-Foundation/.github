# Reusable safety gate workflow for Gilamonster Foundation repos.
# Copy this to .github/workflows/safety-gate.yml in your repo,
# or reference it as a reusable workflow.
#
# HOOK PARITY: Mirrors the pre-commit hooks in .pre-commit-config.yaml.
# When editing this file, update the pre-commit config to match.

name: Safety Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  forbidden-patterns:
    name: Check forbidden patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for forbidden patterns
        run: |
          # Patterns that must never appear in Foundation repos.
          # These catch private infrastructure details that could leak
          # through copy-paste from private repos.
          PATTERNS=(
            '192\.168\.[0-9]+\.[0-9]+'
            '/home/[a-z][a-z0-9_-]+/'
            'geforcenuc|gnuc[^a-z]'
            'server1[^a-z]'
            'BEGIN (RSA|DSA|EC|OPENSSH) PRIVATE KEY'
          )

          FAILED=0
          for pattern in "${PATTERNS[@]}"; do
            if grep -rEn "$pattern" --include='*.rs' --include='*.py' \
               --include='*.toml' --include='*.yml' --include='*.yaml' \
               --include='*.md' --include='*.json' --include='*.sh' \
               . 2>/dev/null | grep -v '.git/' | grep -v 'safety-gate.yml'; then
              echo "::error::Forbidden pattern found: $pattern"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "One or more forbidden patterns were detected."
            echo "These patterns indicate private infrastructure details"
            echo "that should not appear in public repositories."
            exit 1
          fi

          echo "No forbidden patterns found."
